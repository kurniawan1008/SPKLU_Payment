# ============================================================================
# Nginx reverse proxy untuk SPKLU
# Salin ke:  /etc/nginx/sites-available/spklu
# Aktifkan:  ln -s /etc/nginx/sites-available/spklu /etc/nginx/sites-enabled/
#            nginx -t && systemctl reload nginx
# Ganti `spklu.contoh.com` dengan domain Anda.
# ============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name spklu.contoh.com;

    # Ukuran body maksimal (mis. untuk request besar).
    client_max_body_size 5m;

    # Kompresi respons teks.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1024;

    # ===== Aplikasi Node (Express + Socket.IO) =====
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Header WAJIB untuk WebSocket (Socket.IO).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Teruskan info klien asli (dipakai trust proxy + rate-limit).
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout lebih panjang agar koneksi WebSocket tidak cepat putus.
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

# ----------------------------------------------------------------------------
# Setelah HTTPS diaktifkan via certbot (lihat DEPLOY.md), certbot akan
# menambah blok server :443 + redirect 80→443 secara otomatis.
# ----------------------------------------------------------------------------
